<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercicio de lista</title>
    <style>
      :root {
        --bg-deep: #0b1220;
        --bg-card: #121a2b;
        --bg-elevated: #1a2438;
        --border: rgba(148, 163, 184, 0.12);
        --text: #e8edf5;
        --text-muted: #94a3b8;
        --accent: #22d3ee;
        --accent-dim: rgba(34, 211, 238, 0.15);
        --accent-hover: #06b6d4;
        --success: #34d399;
        --success-bg: rgba(52, 211, 153, 0.12);
        --error: #f87171;
        --error-bg: rgba(248, 113, 113, 0.12);
        --info: #38bdf8;
        --info-bg: rgba(56, 189, 248, 0.12);
        --radius-sm: 10px;
        --radius-md: 14px;
        --radius-lg: 20px;
        --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.45);
        --font: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont,
          "Roboto", sans-serif;
        --max-read: 72rem;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        min-height: 100dvh;
        font-family: var(--font);
        font-size: clamp(0.9375rem, 0.88rem + 0.2vw, 1.0625rem);
        line-height: 1.55;
        color: var(--text);
        background: var(--bg-deep);
        background-image: radial-gradient(
            ellipse 120% 80% at 50% -20%,
            rgba(34, 211, 238, 0.08),
            transparent 55%
          ),
          radial-gradient(
            ellipse 80% 50% at 100% 100%,
            rgba(56, 189, 248, 0.06),
            transparent 50%
          ),
          linear-gradient(180deg, var(--bg-deep) 0%, #070b12 100%);
        -webkit-font-smoothing: antialiased;
      }

      main {
        width: min(100% - clamp(1rem, 4vw, 3rem), var(--max-read));
        margin-inline: auto;
        margin-block: clamp(1.25rem, 5vw, 3.5rem);
        padding: clamp(1.25rem, 4vw, 2.75rem);
        background: linear-gradient(
          145deg,
          var(--bg-card) 0%,
          var(--bg-elevated) 100%
        );
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow);
      }

      form {
        display: flex;
        flex-direction: column;
        gap: clamp(0.75rem, 2vw, 1rem);
        margin-bottom: clamp(1.25rem, 3vw, 2rem);
      }

      form label[for="item"] {
        font-weight: 600;
        letter-spacing: 0.02em;
        color: var(--text-muted);
        font-size: 0.8125rem;
        text-transform: uppercase;
      }

      form input#item {
        width: 100%;
        padding: 0.875rem 1rem;
        border-radius: var(--radius-sm);
        border: 1px solid var(--border);
        background: rgba(15, 23, 42, 0.6);
        color: var(--text);
        outline: none;
        transition: border-color 0.2s ease, box-shadow 0.2s ease,
          background 0.2s ease;
      }

      form input#item::placeholder {
        color: var(--text-muted);
        opacity: 0.75;
      }

      form input#item:focus {
        border-color: rgba(34, 211, 238, 0.45);
        box-shadow: 0 0 0 3px var(--accent-dim);
        background: rgba(15, 23, 42, 0.85);
      }

      form button {
        font-family: inherit;
        font-size: 0.9375rem;
        font-weight: 600;
        cursor: pointer;
        border-radius: var(--radius-sm);
        padding: 0.75rem 1.125rem;
        border: 1px solid transparent;
        transition: transform 0.15s ease, background 0.2s ease,
          border-color 0.2s ease, box-shadow 0.2s ease;
      }

      form button:active {
        transform: scale(0.98);
      }

      form button:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      #botao-adicionar {
        background: linear-gradient(
          135deg,
          var(--accent) 0%,
          var(--accent-hover) 100%
        );
        color: #042f2e;
        box-shadow: 0 4px 14px rgba(34, 211, 238, 0.35);
      }

      #botao-adicionar:hover {
        filter: brightness(1.06);
        box-shadow: 0 6px 20px rgba(34, 211, 238, 0.4);
      }

      #limpar-lista,
      #carregar-lista,
      #salvar-lista {
        background: rgba(30, 41, 59, 0.8);
        color: var(--text);
        border-color: var(--border);
      }

      #limpar-lista:hover,
      #carregar-lista:hover,
      #salvar-lista:hover {
        background: rgba(51, 65, 85, 0.95);
        border-color: rgba(148, 163, 184, 0.25);
      }

      #lista-itens {
        list-style: none;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }

      #lista-itens li {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
        padding: 0.75rem 1rem;
        background: rgba(15, 23, 42, 0.55);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        word-break: break-word;
      }

      #lista-itens li button.remover {
        flex-shrink: 0;
        font-family: inherit;
        font-size: 0.8125rem;
        font-weight: 600;
        padding: 0.45rem 0.85rem;
        border-radius: 8px;
        cursor: pointer;
        border: 1px solid rgba(248, 113, 113, 0.35);
        background: rgba(248, 113, 113, 0.1);
        color: #fecaca;
        transition: background 0.2s ease, border-color 0.2s ease;
      }

      #lista-itens li button.remover:hover {
        background: rgba(248, 113, 113, 0.2);
        border-color: rgba(248, 113, 113, 0.55);
      }

      #lista-itens li button.remover:focus-visible {
        outline: 2px solid var(--error);
        outline-offset: 2px;
      }

      #validacao {
        margin: clamp(1rem, 3vw, 1.5rem) 0 0;
        min-height: 1.5em;
        padding: 0.65rem 1rem;
        border-radius: var(--radius-sm);
        font-size: 0.9rem;
        font-weight: 500;
        border: 1px solid transparent;
        transition: background 0.2s ease, border-color 0.2s ease,
          color 0.2s ease;
      }

      #validacao:empty {
        padding: 0;
        min-height: 0;
        border: none;
      }

      #validacao.erro {
        color: #fecaca;
        background: var(--error-bg);
        border-color: rgba(248, 113, 113, 0.3);
      }

      #validacao.sucess {
        color: #a7f3d0;
        background: var(--success-bg);
        border-color: rgba(52, 211, 153, 0.3);
      }

      #validacao.info {
        color: #bae6fd;
        background: var(--info-bg);
        border-color: rgba(56, 189, 248, 0.3);
      }

      /* Tablet: grade 2 colunas nos botoes auxiliares */
      @media (min-width: 600px) {
        form {
          display: grid;
          grid-template-columns: repeat(2, minmax(0, 1fr));
          gap: 0.875rem;
          align-items: stretch;
        }

        form label[for="item"] {
          grid-column: 1 / -1;
        }

        form input#item {
          grid-column: 1 / -1;
        }

        #botao-adicionar {
          grid-column: 1 / -1;
        }

        #limpar-lista {
          grid-column: 1;
        }

        #carregar-lista {
          grid-column: 2;
        }

        #salvar-lista {
          grid-column: 1 / -1;
        }
      }

      @media (min-width: 768px) {
        main {
          padding: 2.25rem 2.5rem;
        }
      }

      /* Notebook / desktop: campo + adicionar na mesma linha; tres acoes em linha */
      @media (min-width: 1024px) {
        :root {
          --max-read: 56rem;
        }

        form {
          grid-template-columns: repeat(3, minmax(0, 1fr)) auto;
          column-gap: 1rem;
          row-gap: 1rem;
          align-items: stretch;
        }

        form label[for="item"] {
          grid-column: 1 / -1;
          grid-row: 1;
        }

        form input#item {
          grid-column: 1 / 4;
          grid-row: 2;
          min-height: 48px;
        }

        #botao-adicionar {
          grid-column: 4;
          grid-row: 2;
          min-height: 48px;
        }

        #limpar-lista {
          grid-column: 1;
          grid-row: 3;
        }

        #carregar-lista {
          grid-column: 2;
          grid-row: 3;
        }

        #salvar-lista {
          grid-column: 3 / -1;
          grid-row: 3;
        }

        #lista-itens li {
          padding: 0.85rem 1.15rem;
        }
      }

      /* TV e telas muito grandes: limitar largura e ampliar legibilidade */
      @media (min-width: 1600px) {
        :root {
          --max-read: 64rem;
        }

        body {
          font-size: 1.0625rem;
        }

        main {
          padding: 3rem 3.25rem;
          border-radius: 24px;
        }
      }

      @media (min-width: 1920px) {
        :root {
          --max-read: 70rem;
        }

        body {
          font-size: 1.125rem;
        }

        main {
          margin-block: clamp(2.5rem, 4vw, 4rem);
        }
      }
    </style>
  </head>
  <body>
    <main>
      <form action="">
        <label for="item">Digite o item:</label>
        <input type="text" name="item" id="item" placeholder="aguardando.." />
        <button type="submit" id="botao-adicionar">Adicionar</button>
        <button type="button" id="limpar-lista">Limpar Lista</button>
        <button type="button" id="carregar-lista">Carregar Lista</button>
        <button type="button" id="salvar-lista">Salvar Lista</button>
      </form>
      <ul id="lista-itens"></ul>
      <p id="validacao"></p>
    </main>

    <script>
      /* --------------------------------------------------------------------------
         Referencias ao DOM e estado da aplicacao.
         Os elementos sao buscados uma vez no carregamento para evitar consultas
         repetidas. listaSalva espelha os itens da lista; timeoutMensagem guarda
         o temporizador da mensagem para poder cancelar antes de exibir outra;
         carregandoLista indica se os <li> estao sendo montados a partir do
         armazenamento local (para nao disparar o fluxo de "item adicionado").
      -------------------------------------------------------------------------- */
      const item = document.getElementById("item");
      const botaoAdicionar = document.getElementById("botao-adicionar");
      const limparLista = document.getElementById("limpar-lista");
      const carregarLista = document.getElementById("carregar-lista");
      const salvarLista = document.getElementById("salvar-lista");
      const listaDeItens = document.getElementById("lista-itens");
      const msgValidacao = document.getElementById("validacao");
      let listaSalva = [];
      let timeoutMensagem = null;
      let carregandoLista = false;

      /* Adicionar: evita envio do form, le o input e segue o fluxo de validacao. */
      botaoAdicionar.addEventListener("click", function (e) {
        e.preventDefault();
        pegarValor();
      });

      /* Limpar: esvazia a interface e a memoria e remove a chave no localStorage,
         para que nao reste lista persistida apos o usuario limpar. */
      limparLista.addEventListener("click", (e) => {
        e.preventDefault();
        listaDeItens.innerHTML = "";
        listaSalva = [];
        localStorage.removeItem("listaSalva");
      });

      /* Carregar: le a string JSON salva; se existir, converte para array.
         Lista vazia no arquivo gera aviso informativo. Com dados, atualiza
         listaSalva, marca carregandoLista para renderizar sem mensagens de
         adicao por item, chama renderizarLista e depois informa sucesso. */
      carregarLista.addEventListener("click", (e) => {
        e.preventDefault();
        const dadosLista = localStorage.getItem("listaSalva");
        if (dadosLista) {
          const arrayDados = JSON.parse(dadosLista);
          if (arrayDados.length === 0) {
            mostrarMensagem(
              "info",
              "A lista foi carregada mas esta vazia no momento.",
              3000,
            );
            return;
          } else {
            listaSalva = arrayDados;
            carregandoLista = true;
            renderizarLista();
            carregandoLista = false;
            mostrarMensagem("sucess", "Lista carregada com sucesso!", 2500);
          }
          return;
        } else {
          mostrarMensagem("info", "Nenhuma lista salva foi encontrada.", 2300);
          return;
        }
      });

      /* Salvar: grava o array atual como JSON na mesma chave usada no carregar. */
      salvarLista.addEventListener("click", (e) => {
        e.preventDefault();
        localStorage.setItem("listaSalva", JSON.stringify(listaSalva));
        mostrarMensagem("sucess", "Lista foi salva!", 2000);
      });

      /* Reconstroi o <ul> a partir de listaSalva: limpa o DOM, ordena em pt-BR
         (ignorando maiusculas/minusculas) e recria cada linha com criarLi. */
      function renderizarLista() {
        listaDeItens.innerHTML = "";
        listaSalva.sort((a, b) =>
          a.localeCompare(b, "pt-BR", { sensitivity: "base" }),
        );

        listaSalva.forEach((Item) => {
          criarLi(Item);
        });
      }

      /* Le o campo, remove espacos nas pontas e delega as regras a validarValor. */
      function pegarValor() {
        const valorItem = item.value.trim();
        validarValor(valorItem);
      }

      /* Regras de negocio do item: vazio mostra erro; duplicado avisa e limpa o
         campo; caso valido, empilha no array e cria o <li> correspondente. */
      function validarValor(valorItem) {
        if (valorItem === "") {
          mostrarMensagem(
            "erro",
            "Por favor digite um valor valido e preenchido corretamente para proseguir.",
            3500,
          );
        } else if (listaSalva.includes(valorItem)) {
          mostrarMensagem(
            "info",
            `O item "${valorItem.toUpperCase()}"já pertence a lista de itens. Por gentileza adicione um novo item.`,
            3500,
          );
          item.value = "";
          item.focus();
        } else {
          listaSalva.push(valorItem);
          criarLi(valorItem);
        }
      }

      /* Exibe feedback no paragrafo #validacao: troca a classe (CSS), define o
         texto e agenda a limpeza automatica apos `tempo` ms; cancela o timer
         anterior para mensagens nao se sobreporem. */
      function mostrarMensagem(tipo, texto, tempo) {
        msgValidacao.classList.remove("erro");
        msgValidacao.classList.remove("sucess");
        msgValidacao.classList.remove("info");
        msgValidacao.textContent = "";

        clearTimeout(timeoutMensagem);
        msgValidacao.classList.add(tipo);
        msgValidacao.textContent = texto;

        let newTimeout = setTimeout(() => {
          msgValidacao.textContent = "";
          msgValidacao.classList.remove(tipo);
        }, tempo);

        timeoutMensagem = newTimeout;
      }

      /* Monta um <li> com o texto do item, botao Remover que tira o elemento do
         DOM, atualiza listaSalva e persiste no localStorage; em seguida chama
         adicionarItemLista para inserir no <ul> e tratar feedback ao usuario. */
      function criarLi(valorItem) {
        const li = document.createElement("li");
        li.textContent = valorItem;

        const botaoRemover = document.createElement("button");
        botaoRemover.textContent = "Remover";
        botaoRemover.classList.add("remover");
        botaoRemover.addEventListener("click", () => {
          li.remove();
          let indice = listaSalva.indexOf(valorItem);
          listaSalva.splice(indice, 1);
          localStorage.setItem("listaSalva", JSON.stringify(listaSalva));
        });
        li.appendChild(botaoRemover);
        adicionarItemLista(li, valorItem);
      }

      /* Anexa o <li> ao <ul>. Durante carregar lista, sai cedo para nao mostrar
         uma mensagem de sucesso por item; em adicao manual, confirma e limpa o
         input para o proximo item. */
      function adicionarItemLista(li, valorItem) {
        listaDeItens.appendChild(li);
        if (carregandoLista === true) return;

        mostrarMensagem(
          "sucess",
          `Item ${valorItem} adicionado a lista.`,
          3500,
        );

        item.value = "";
        item.focus();
      }
    </script>
  </body>
</html>
