<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercicio 3 eventos DOM</title>
    <style>
      :root {
        --bg: #0f1419;
        --bg-elevated: #1a2332;
        --border: rgba(255, 255, 255, 0.08);
        --text: #e8eef7;
        --muted: #8b9aaf;
        --accent: #3d9cf0;
        --accent-dim: rgba(61, 156, 240, 0.15);
        --success: #34c759;
        --warning: #ff9f0a;
        --danger: #ff453a;
        --radius: 14px;
        --shadow: 0 18px 50px rgba(0, 0, 0, 0.45);
        --font: "Segoe UI", system-ui, -apple-system, sans-serif;
        --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: var(--font);
        color: var(--text);
        background:
          radial-gradient(1200px 600px at 15% -10%, rgba(61, 156, 240, 0.18), transparent 55%),
          radial-gradient(900px 500px at 100% 20%, rgba(52, 199, 89, 0.08), transparent 50%),
          var(--bg);
        line-height: 1.5;
      }

      /* Barra de “carregamento” (~3s, alinhada ao setTimeout do JS) */
      body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        height: 3px;
        width: 100%;
        transform-origin: left;
        background: linear-gradient(90deg, var(--accent), #7ec8ff, var(--accent));
        z-index: 100;
        animation: boot-bar 3s var(--ease-out) forwards;
      }

      @keyframes boot-bar {
        0% {
          transform: scaleX(0.08);
          opacity: 1;
        }
        70% {
          transform: scaleX(0.92);
          opacity: 1;
        }
        100% {
          transform: scaleX(1);
          opacity: 0;
        }
      }

      /* Faixa de status inicial */
      body::after {
        content: "Recuperando dados salvos…";
        position: fixed;
        top: 14px;
        left: 50%;
        transform: translateX(-50%) translateY(-8px);
        padding: 0.45rem 1rem;
        font-size: 0.8125rem;
        font-weight: 600;
        letter-spacing: 0.02em;
        color: var(--text);
        background: var(--bg-elevated);
        border: 1px solid var(--border);
        border-radius: 999px;
        box-shadow: var(--shadow);
        z-index: 99;
        opacity: 0;
        pointer-events: none;
        animation: boot-toast 3.1s var(--ease-out) forwards;
      }

      @keyframes boot-toast {
        0% {
          opacity: 0;
          transform: translateX(-50%) translateY(-12px);
        }
        8% {
          opacity: 1;
          transform: translateX(-50%) translateY(0);
        }
        78% {
          opacity: 1;
          transform: translateX(-50%) translateY(0);
        }
        100% {
          opacity: 0;
          transform: translateX(-50%) translateY(-8px);
        }
      }

      .app {
        max-width: 1100px;
        margin: 0 auto;
        padding: clamp(1.25rem, 4vw, 2.5rem);
        min-height: 100vh;
        display: grid;
        gap: clamp(1.25rem, 3vw, 2rem);
        align-content: center;
        animation: app-in 0.7s var(--ease-out) backwards;
      }

      @keyframes app-in {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (min-width: 900px) {
        .app {
          grid-template-columns: 1fr minmax(280px, 360px);
          align-items: start;
          align-content: stretch;
          padding-top: 2.5rem;
        }

        .counter-panel {
          justify-self: center;
          max-width: 420px;
          width: 100%;
        }

        .history-panel {
          position: sticky;
          top: 1.5rem;
        }
      }

      .counter-panel {
        background: var(--bg-elevated);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: clamp(1.5rem, 4vw, 2.25rem);
        box-shadow: var(--shadow);
        text-align: center;
        animation: panel-pop 0.55s var(--ease-out) 0.1s backwards;
      }

      .history-panel {
        background: var(--bg-elevated);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: clamp(1.25rem, 3vw, 1.75rem);
        box-shadow: var(--shadow);
        animation: panel-pop 0.55s var(--ease-out) 0.2s backwards;
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      @keyframes panel-pop {
        from {
          opacity: 0;
          transform: translateY(16px) scale(0.98);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      .history-panel > div:first-child {
        flex: 1;
        min-height: 0;
      }

      /* Título só em CSS */
      .history-wrap::before {
        content: "Histórico de ações";
        display: block;
        font-size: 0.75rem;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 0.75rem;
      }

      .counter-display {
        font-variant-numeric: tabular-nums;
        font-size: clamp(3rem, 12vw, 4.25rem);
        font-weight: 800;
        line-height: 1;
        margin-bottom: 1.5rem;
        background: linear-gradient(180deg, #fff 0%, #b8c9dc 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        filter: drop-shadow(0 4px 20px rgba(61, 156, 240, 0.25));
        animation: count-pulse 0.6s var(--ease-out) 0.15s backwards;
      }

      @keyframes count-pulse {
        from {
          opacity: 0;
          transform: scale(0.92);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      .btn-group {
        display: flex;
        flex-wrap: wrap;
        gap: 0.65rem;
        justify-content: center;
      }

      .btn-group button {
        appearance: none;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 0.65rem 1.1rem;
        font-size: 0.9rem;
        font-weight: 600;
        font-family: inherit;
        cursor: pointer;
        color: var(--text);
        background: rgba(255, 255, 255, 0.04);
        transition:
          transform 0.2s var(--ease-out),
          box-shadow 0.2s var(--ease-out),
          border-color 0.2s,
          background 0.2s;
      }

      .btn-group button:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
        border-color: rgba(61, 156, 240, 0.35);
        background: rgba(61, 156, 240, 0.12);
      }

      .btn-group button:active {
        transform: translateY(0) scale(0.98);
      }

      .btn-group button:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      #btn-incrementar {
        border-color: rgba(52, 199, 89, 0.35);
        background: rgba(52, 199, 89, 0.12);
      }

      #btn-incrementar:hover {
        border-color: rgba(52, 199, 89, 0.55);
        background: rgba(52, 199, 89, 0.2);
      }

      #btn-decrementar:hover {
        border-color: rgba(255, 159, 10, 0.45);
        background: rgba(255, 159, 10, 0.12);
      }

      #btn-zerar:hover {
        border-color: rgba(255, 69, 58, 0.45);
        background: rgba(255, 69, 58, 0.1);
      }

      .history-wrap {
        position: relative;
      }

      #historico {
        list-style: none;
        margin: 0;
        padding: 0.35rem 0 0;
        max-height: min(52vh, 420px);
        overflow-y: auto;
        scroll-behavior: smooth;
        scrollbar-width: thin;
        scrollbar-color: rgba(61, 156, 240, 0.45) transparent;
      }

      #historico::-webkit-scrollbar {
        width: 8px;
      }

      #historico::-webkit-scrollbar-thumb {
        background: rgba(61, 156, 240, 0.35);
        border-radius: 999px;
      }

      /* Skeleton curto enquanto o ul pode estar vazio no boot (~3s); depois fica um vazio discreto */
      #historico:empty {
        min-height: 120px;
        border-radius: 10px;
        background: linear-gradient(
          90deg,
          rgba(255, 255, 255, 0.04) 0%,
          rgba(255, 255, 255, 0.09) 50%,
          rgba(255, 255, 255, 0.04) 100%
        );
        background-size: 200% 100%;
        animation:
          historico-empty-box 3.4s var(--ease-out) forwards,
          shimmer 1.15s ease-in-out 2;
      }

      @keyframes historico-empty-box {
        0%,
        85% {
          min-height: 120px;
        }
        100% {
          min-height: 3rem;
          background: rgba(255, 255, 255, 0.02);
          background-size: 100% 100%;
        }
      }

      @keyframes shimmer {
        0% {
          background-position: 100% 0;
        }
        100% {
          background-position: -100% 0;
        }
      }

      #historico:empty::after {
        content: "Aguardando sincronização…";
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 120px;
        padding: 1rem;
        font-size: 0.85rem;
        color: var(--muted);
        animation: skeleton-label 3.4s var(--ease-out) forwards;
      }

      @keyframes skeleton-label {
        0%,
        75% {
          opacity: 1;
        }
        90%,
        100% {
          opacity: 0;
          visibility: hidden;
          min-height: 0;
        }
      }

      #historico li {
        position: relative;
        padding: 0.65rem 0.85rem 0.65rem 1.25rem;
        margin-bottom: 0.5rem;
        font-size: 0.875rem;
        color: var(--text);
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid var(--border);
        border-radius: 10px;
        animation: li-in 0.4s var(--ease-out) backwards;
      }

      #historico li::before {
        content: "";
        position: absolute;
        left: 0.5rem;
        top: 50%;
        transform: translateY(-50%);
        width: 4px;
        height: 60%;
        border-radius: 999px;
        background: linear-gradient(180deg, var(--accent), rgba(61, 156, 240, 0.3));
        opacity: 0.85;
      }

      #historico li:nth-child(1) {
        animation-delay: 0ms;
      }
      #historico li:nth-child(2) {
        animation-delay: 45ms;
      }
      #historico li:nth-child(3) {
        animation-delay: 90ms;
      }
      #historico li:nth-child(4) {
        animation-delay: 135ms;
      }
      #historico li:nth-child(5) {
        animation-delay: 180ms;
      }
      #historico li:nth-child(6) {
        animation-delay: 225ms;
      }
      #historico li:nth-child(7) {
        animation-delay: 270ms;
      }
      #historico li:nth-child(8) {
        animation-delay: 315ms;
      }
      #historico li:nth-child(9) {
        animation-delay: 360ms;
      }
      #historico li:nth-child(10) {
        animation-delay: 405ms;
      }
      #historico li:nth-child(11) {
        animation-delay: 450ms;
      }
      #historico li:nth-child(12) {
        animation-delay: 495ms;
      }
      #historico li:nth-child(13) {
        animation-delay: 540ms;
      }
      #historico li:nth-child(14) {
        animation-delay: 585ms;
      }
      #historico li:nth-child(15) {
        animation-delay: 630ms;
      }
      #historico li:nth-child(16) {
        animation-delay: 675ms;
      }
      #historico li:nth-child(17) {
        animation-delay: 720ms;
      }
      #historico li:nth-child(18) {
        animation-delay: 765ms;
      }
      #historico li:nth-child(19) {
        animation-delay: 810ms;
      }
      #historico li:nth-child(20) {
        animation-delay: 855ms;
      }
      #historico li:nth-child(21) {
        animation-delay: 900ms;
      }
      #historico li:nth-child(22) {
        animation-delay: 945ms;
      }
      #historico li:nth-child(23) {
        animation-delay: 990ms;
      }
      #historico li:nth-child(24) {
        animation-delay: 1035ms;
      }
      #historico li:nth-child(25) {
        animation-delay: 1080ms;
      }

      @keyframes li-in {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      #info {
        position: fixed;
        bottom: 1.5rem;
        left: 50%;
        transform: translateX(-50%) translateY(12px);
        margin: 0;
        max-width: min(90vw, 420px);
        padding: 0.65rem 1.25rem;
        font-size: 0.875rem;
        font-weight: 600;
        text-align: center;
        color: var(--text);
        background: var(--bg-elevated);
        border: 1px solid var(--border);
        border-radius: 12px;
        box-shadow: var(--shadow);
        z-index: 50;
        opacity: 0;
        pointer-events: none;
        transition:
          opacity 0.35s var(--ease-out),
          transform 0.35s var(--ease-out);
      }

      #info:not(:empty) {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
        animation: toast-in 0.4s var(--ease-out);
      }

      @keyframes toast-in {
        from {
          opacity: 0;
          transform: translateX(-50%) translateY(16px) scale(0.96);
        }
        to {
          opacity: 1;
          transform: translateX(-50%) translateY(0) scale(1);
        }
      }

      .history-panel > div:last-child {
        display: flex;
        justify-content: stretch;
      }

      #btn-apagar-historico {
        width: 100%;
        appearance: none;
        border: 1px solid rgba(255, 69, 58, 0.35);
        border-radius: 10px;
        padding: 0.6rem 1rem;
        font-size: 0.85rem;
        font-weight: 600;
        font-family: inherit;
        cursor: pointer;
        color: var(--text);
        background: rgba(255, 69, 58, 0.1);
        transition:
          transform 0.2s var(--ease-out),
          box-shadow 0.2s,
          background 0.2s;
      }

      #btn-apagar-historico:hover {
        transform: translateY(-1px);
        box-shadow: 0 6px 20px rgba(255, 69, 58, 0.2);
        background: rgba(255, 69, 58, 0.18);
      }

      #btn-apagar-historico:active {
        transform: translateY(0) scale(0.99);
      }

      #btn-apagar-historico:focus-visible {
        outline: 2px solid var(--danger);
        outline-offset: 2px;
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }

        html {
          scroll-behavior: auto;
        }

        #historico {
          scroll-behavior: auto;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <section class="counter-panel">
        <div id="contagem" class="counter-display">0</div>
        <div id="botoes" class="btn-group">
          <button id="btn-incrementar">Incrementar</button>
          <button id="btn-decrementar">Decrementar</button>
          <button id="btn-zerar">Zerar</button>
        </div>
      </section>

      <section class="history-panel">
        <div class="history-wrap">
          <ul id="historico"></ul>
          <p id="info"></p>
        </div>
        <div>
          <button id="btn-apagar-historico">Apagar Historico</button>
        </div>
      </section>
    </main>

    <script>
      const displayContagem = document.getElementById("contagem");
      const botaoIncrementar = document.getElementById("btn-incrementar");
      const botaoDecrementar = document.getElementById("btn-decrementar");
      const botaoZerar = document.getElementById("btn-zerar");
      const listaHistorico = document.getElementById("historico");
      const info = document.getElementById("info");
      const botaoApagarHistorico = document.getElementById(
        "btn-apagar-historico",
      );

      let estado = {
        contador: 0,
        historico: [],
        limiteHistorico: 25,
      };

      botaoIncrementar.addEventListener("click", fazerIncremento);
      botaoDecrementar.addEventListener("click", fazerDecremento);
      botaoZerar.addEventListener("click", zerar);
      botaoApagarHistorico.addEventListener("click", apagarHistorico);

      function fazerIncremento() {
        estado.contador++;
        mudarDisplay();

        adicionarHistorico(`Incrementou para ${estado.contador} — ${horaAgora()}`);

        salvarEstado();
      }

      function fazerDecremento() {
        if (estado.contador === 0) {
          mostrarMensagem("Não é possivel decrementar abaixo de zero.");
          return;
        }

        estado.contador--;
        mudarDisplay();

        adicionarHistorico(`Decrementou para ${estado.contador} — ${horaAgora()}`);

        salvarEstado();
      }

      function zerar() {
        if (estado.contador === 0) {
          mostrarMensagem("O contador já esta zerado!.");
          return;
        }

        const agora = new Date();
        const horario = agora.toLocaleTimeString();

        estado.contador = 0;
        mudarDisplay();

        adicionarHistorico(`Zerou o contador! — ${horaAgora()}`);
        mostrarMensagem("Zerou o contador!");
        salvarEstado();
      }

      function adicionarHistorico(mensagem) {
        if (estado.historico[estado.historico.length - 1] === mensagem) return;
        
        estado.historico.push(mensagem);

        if (estado.historico.length > estado.limiteHistorico) {
          estado.historico.shift();
        };
        
        renderizarHistorico();
      }

      function mudarDisplay() {
        displayContagem.textContent = estado.contador;
      }

      function mostrarMensagem(texto) {
        info.textContent = texto;
        setTimeout(() => { info.textContent = "" }, 2500);
      }

      function apagarHistorico() {
        estado.historico = [];
        renderizarHistorico();
        mostrarMensagem("Historico apagado!");
        salvarEstado();
      }

      function salvarEstado() {
        localStorage.setItem("estado", JSON.stringify(estado));
      }

      function carregarEstado() {
        const salvo = localStorage.getItem("estado");

        if (!salvo) return;

        estado = JSON.parse(salvo);

        mudarDisplay();
        renderizarHistorico();
        mostrarMensagem("Dados salvos carregados!");
      }

      function renderizarHistorico() {
        listaHistorico.innerHTML = "";

        estado.historico.forEach((item) => {
          const li = document.createElement("li");
          li.textContent = item;
          listaHistorico.appendChild(li);
        });
      }

      function horaAgora() {
        return new Date().toLocaleTimeString();
      };

      setTimeout(() => { carregarEstado() }, 3000);
    </script>
  </body>
</html>
