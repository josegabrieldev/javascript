<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lógica de Programação JavaScript</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Fira+Code&display=swap");

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        width: 100vw;
        height: 100vh;
        background: linear-gradient(135deg, #02a676, #003840);
        font-family: "Fira Code", monospace;
        font-size: 1em;
        padding: 40px;
        color: #f0f0f0;
      }

      h1 {
        font-size: 2.5em;
        color: #ffffff;
        text-align: center;
        margin-bottom: 30px;
        text-shadow: 2px 2px 6px #00000088;
      }

      .card {
        background: #ffffff11;
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 30px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        transition: transform 0.2s ease;
      }

      .card:hover {
        transform: scale(1.02);
      }

      h2 {
        font-size: 1.8em;
        color: #fbff00;
        margin-bottom: 15px;
        text-shadow: 1px 1px 4px #00000099;
      }

      p {
        font-size: 1.2em;
        color: #e0e0e0;
        margin-bottom: 20px;
        text-align: justify;
        line-height: 1.6;
      }

      code {
        background: #00000055;
        color: #00ffcc;
        padding: 4px 8px;
        border-radius: 6px;
        font-size: 1em;
      }
    </style>
  </head>
  <body>
    <h1>Lógica de Programação com JavaScript</h1>

    <div class="card">
      <h2>Problema 00</h2>
      <p>Descrição do Problema</p>
    </div>

    <script>
      // Códigos JavaScript para resolver o problema
    </script>
  </body>
</html>
